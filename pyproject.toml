[project]
name = "sinyi-search-mcp"
version = "0.1.0"
description = "台灣房屋物件搜尋 MCP Server（信義房屋 API）"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
sinyi-search-mcp = "sinyi_search_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
